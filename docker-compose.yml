services:
  backend:
    build: ./backend
    ports:
      - "3001:3001"
    env_file:
      - ./backend/.env
    environment:
      MONGODB_URI: mongodb://mongo:27017/resumeforge
      PORT: 3001
    depends_on:
      - mongo

  agent:
    build: ./agent
    env_file:
      - ./agent/.env
    environment:
      MONGODB_URI: mongodb://mongo:27017/resumeforge
    depends_on:
      - mongo

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
