services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - ./.env.deploy
    environment:
      MONGODB_URI: mongodb://mongo:27017/${MONGODB_DB:-resumeforge}
      PORT: 3001
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
    depends_on:
      mongo:
        condition: service_healthy

  agent:
    build:
      context: ./agent
    restart: unless-stopped
    env_file:
      - ./.env.deploy
    environment:
      MONGODB_URI: mongodb://mongo:27017/${MONGODB_DB:-resumeforge}
    depends_on:
      mongo:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    depends_on:
      - backend

volumes:
  mongo_data:
