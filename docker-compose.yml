# docker-compose.yml
version: '3.9'
services:
  backend:
    build: ./backend
    ports: ["3001:3001"]
    env_file: .env
    depends_on: [mongo, redis]

  agent:
    build: ./agent
    env_file: .env
    depends_on: [mongo]

  frontend:
    build: ./frontend
    ports: ["5173:5173"]
    environment:
      - VITE_API_URL=http://localhost:3001

  mongo:
    image: mongo:7
    ports: ["27017:27017"]
    volumes: [mongo_data:/data/db]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

volumes:
  mongo_data: